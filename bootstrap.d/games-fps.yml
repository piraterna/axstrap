sources:
- name: ax-doomgeneric
  subdir: sources
  git: 'https://github.com/piraterna/doomgeneric.git'
  branch: master
  submodules: false
  rolling_version: true
  version: '0.0pl@ROLLING_ID@'

packages:
  - name: doomgeneric
    default: false
    labels: [ x86_64 ]
    architecture: 'x86_64'
    from_source: ax-doomgeneric
    revision: 1
    pkgs_required:
      - mlibc
    tools_required:
      - aurix-gcc
      - aurix-binutils
    build:
    - args: 
      - 'make'
      - '-C'
      - '@THIS_SOURCE_DIR@/doomgeneric'
      - '-fMakefile.aurix'
      - 'all'
      - 'O=@THIS_BUILD_DIR@'
      - 'OBJDIR=@THIS_BUILD_DIR@'
      - 'HOSTCC=x86_64-aurix-gcc'
      - 'CC=x86_64-aurix-gcc'
      - 'CROSS_COMPILE=x86_64-aurix-'
    - args:
      - 'make'
      - '-C'
      - '@THIS_SOURCE_DIR@/doomgeneric'
      - '-fMakefile.aurix'
      - 'install'
      - 'O=@THIS_BUILD_DIR@'
      - 'OBJDIR=@THIS_BUILD_DIR@'
      - 'HOSTCC=x86_64-aurix-gcc'
      - 'CC=x86_64-aurix-gcc'
      - 'CROSS_COMPILE=x86_64-aurix-'
      - 'PREFIX=@BUILD_ROOT@/initrd/bin'