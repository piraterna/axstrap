sources:
- name: aurix
  subdir: sources
  git: 'https://github.com/piraterna/aurix.git'
  branch: main
  submodules: true
  rolling_version: true
  version: '0.0pl@ROLLING_ID@'

packages:
- name: kernel
  default: true
  labels: [ x86_64 ]
  architecture: 'x86_64'
  from_source: aurix
  revision: 2
  pkgs_required:
    - mlibc-headers
  tools_required:
    - aurix-gcc
    - aurix-binutils
  configure:
    - args: ['cp', '-r', '@THIS_SOURCE_DIR@', '@THIS_BUILD_DIR@']
    - args:
      - 'make'
      - '-C'
      - '@THIS_BUILD_DIR@/aurix'
      - 'defconfig'
  build:
  - args:
    - 'make'
    - '-C'
    - '@THIS_BUILD_DIR@/aurix'
    - 'all'
  - args:
    - 'make'
    - '-C'
    - '@THIS_BUILD_DIR@/aurix'
    - 'install'
  - args: ['cp', '-r', '@THIS_BUILD_DIR@/aurix/sysroot', '@BUILD_ROOT@/kernel-sysroot']

- name: kernel-initrd
  default: true
  labels: [ x86_64 ]
  architecture: 'x86_64'
  from_source: aurix
  revision: 1
  pkgs_required:
    - kernel
    - init
    - toybox
  build:
  # setup initrd and copy over libc stuff
  - args: ['mkdir', '-p', '@BUILD_ROOT@/initrd']
  - args: ['mkdir', '-p', "@BUILD_ROOT@/initrd/usr/lib/"]
  - args: ['find', '@SYSROOT_DIR@/usr/lib', '-name', '*.so*', '-exec', 'cp', '-a', '{}', '@BUILD_ROOT@/initrd/usr/lib/', ';']
  # make the cpio archive
  - args: ['mkdir', '-p', '@BUILD_ROOT@/kernel-sysroot/System']
  - args: ['sh', '-c', 'cd "@BUILD_ROOT@/initrd" && find . -type f -o -type l | cpio -o --format=newc -R 0:0 -F "@BUILD_ROOT@/kernel-sysroot/System/initrd.cpio"']


- name: kernel-iso
  labels: [ x86_64 ]
  architecture: 'x86_64'
  from_source: aurix
  revision: 1
  pkgs_required:
    - kernel
    - kernel-initrd
  tools_required:
    - aurix-gcc
    - aurix-binutils
  build:
  - args:
    - 'make'
    - '-C'
    - '@THIS_SOURCE_DIR@'
    - 'SYSROOT_DIR=@BUILD_ROOT@/kernel-sysroot'
    - 'livecd'
  - args: 'mkdir -p @BUILD_ROOT@/kernel-iso && cp -r @THIS_SOURCE_DIR@/release/* @BUILD_ROOT@/kernel-iso/'