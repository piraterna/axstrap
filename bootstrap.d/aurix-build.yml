sources:
- name: aurix
  subdir: sources
  git: 'https://github.com/piraterna/aurix.git'
  branch: main
  submodules: true
  rolling_version: true
  version: '0.0pl@ROLLING_ID@'

packages:
- name: kernel
  default: true
  labels: [ x86_64 ]
  architecture: 'x86_64'
  from_source: aurix
  revision: 2
  pkgs_required:
    - mlibc-headers
  tools_required:
    - aurix-gcc
    - aurix-binutils
  configure:
    - args: ['cp', '-r', '@THIS_SOURCE_DIR@', '@THIS_BUILD_DIR@']
    - args:
      - 'make'
      - '-C'
      - '@THIS_BUILD_DIR@/aurix'
      - 'defconfig'
  build:
  - args:
    - 'make'
    - '-C'
    - '@THIS_BUILD_DIR@/aurix'
    - 'all'
  - args:
    - 'make'
    - '-C'
    - '@THIS_BUILD_DIR@/aurix'
    - 'install'
  - args: ['cp', '-r', '@THIS_BUILD_DIR@/aurix/sysroot', '@BUILD_ROOT@/kernel-sysroot']

- name: kernel-iso
  labels: [ x86_64 ]
  architecture: 'x86_64'
  from_source: aurix
  revision: 1
  pkgs_required:
    - kernel
  tools_required:
    - aurix-gcc
    - aurix-binutils
  build:
  - args:
    - 'make'
    - '-C'
    - '@THIS_SOURCE_DIR@'
    - 'SYSROOT_DIR=@BUILD_ROOT@/kernel-sysroot'
    - 'livecd'
  - args: ['cp', '-r', '@THIS_SOURCE_DIR@/release', '@BUILD_ROOT@/kernel-iso']