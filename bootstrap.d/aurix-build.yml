sources:
- name: aurix
  subdir: sources
  git: 'https://github.com/piraterna/aurix.git'
  branch: main
  submodules: true
  rolling_version: true
  version: '0.0pl@ROLLING_ID@'

packages:
- name: kernel
  default: true
  labels: [ x86_64 ]
  architecture: 'x86_64'
  from_source: aurix
  revision: 2
  pkgs_required:
    - mlibc-headers
  tools_required:
    - aurix-gcc
    - aurix-binutils
  configure:
    - args:
      - 'make'
      - '-C'
      - '@THIS_SOURCE_DIR@'
      - 'ARCH=x86_64'
      - 'PLATFORM=generic-pc'
      - 'defconfig'
  build:
  - args:
    - 'make'
    - '-C'
    - '@THIS_SOURCE_DIR@'
    - 'BUILD_DIR=@THIS_BUILD_DIR@/build'
    - 'SYSROOT_DIR=@THIS_BUILD_DIR@/sysroot'
    - 'all'
  install:
  - args:
    - 'make'
    - '-C'
    - '@THIS_SOURCE_DIR@'
    - 'install'
    - 'BUILD_DIR=@THIS_BUILD_DIR@/build'
    - 'SYSROOT_DIR=@THIS_COLLECT_DIR@'
